
services:
  mikroservice.ogrenci.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - IdentityOption:Adress=http://keycloak:8080/realms/UniversityRealm
      - IdentityOption:Issuer="http://keycloak:8080/realms/UniversityRealm
      - ElasticSearch:BaseUrl=http://elasticsearch.db.log:9200
      - ConnectionStrings:Redis=redis.db.api:6379,password=Password12
      - ConnectionStrings:PostgreSqlServer=Host=postgres.db.ogrenci;Port=5432;Database=ogrenci_db;Username=ogrenci_db_user;Password=ogrenci_db_user_password
      - ConnectionStrings:HangfirePostgreSqlServer=Host=postgres.db.ogrenci;Port=5432;Database=ogrenci_db;Username=ogrenci_db_user;Password=ogrenci_db_user_password
    ports:
      - "8083:8080"
    depends_on:
      - redis.db.api
      - postgres.db.ogrenci
    restart: always

  mikroservice.personel.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - IdentityOption:Adress=http://keycloak:8080/realms/UniversityRealm
      - IdentityOption:Issuer="http://keycloak:8080/realms/UniversityRealm
      - ElasticSearch:BaseUrl=http://elasticsearch.db.log:9200
      - ConnectionStrings:Redis=redis.db.api:6379,password=Password12
      - ConnectionStrings:PostgreSqlServer=Host=postgres.db.personel;Port=5432;Database=personel_db;Username=personel_db_user;Password=personel_db_user_password
      - ConnectionStrings:HangfirePostgreSqlServer=Host=postgres.db.personel;Port=5432;Database=personel_db;Username=personel_db_user;Password=personel_db_user_password
    ports:
      - "8085:8080"
    depends_on:
      - redis.db.api
      - postgres.db.personel
    restart: always

  mikroservice.gateway:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - IdentityOption:Adress=http://keycloak:8080/realms/UniversityRealm
      - IdentityOption:Issuer=http://keycloak:8080/realms/UniversityRealm
      - ReverseProxy:Clusters:personel.cluster:Destinations:destination1:Address=http://mikroservice.personel.api:8080/
      - ReverseProxy:Clusters:ogrenci.cluster:Destinations:destination1:Address=http://mikroservice.ogrenci.api:8080/
    ports:
      - "8084:8080"
    depends_on:
      - mikroservice.ogrenci.api
      - mikroservice.personel.api
    restart: always

  mikroservice.site.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - IdentityOption:Adress=http://keycloak:8080/realms/UniversityRealm
      - IdentityOption:Issuer="http://keycloak:8080/realms/UniversityRealm
      - ElasticSearch:BaseUrl=http://elasticsearch.db.log:9200
      - ConnectionStrings:Redis=redis.db.api:6379,password=Password12
      - ConnectionStrings:PostgreSqlServer=Host=postgres.db.site;Port=5432;Database=site_db;Username=site_db_user;Password=site_db_user_password
    ports:
      - "8086:8080"
    depends_on:
      - redis.db.api
      - postgres.db.site
    restart: always
