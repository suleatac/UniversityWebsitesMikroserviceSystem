# Prometheus global configuration
global:
  scrape_interval: 15s # Scrape targets every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'university-microservices'
    environment: 'development'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Ogrenci Microservice
  - job_name: 'mikroservice-ogrenci'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mikroservice.ogrenci.api:8080']
        labels:
          service: 'ogrenci-api'
          environment: 'development'

  # Personel Microservice
  - job_name: 'mikroservice-personel'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mikroservice.personel.api:8080']
        labels:
          service: 'personel-api'
          environment: 'development'

  # Gateway Service
  - job_name: 'mikroservice-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mikroservice.gateway:8080']
        labels:
          service: 'gateway'
          environment: 'development'

  # PostgreSQL Exporters (eğer exporter kullanıyorsanız)
  # - job_name: 'postgres-ogrenci'
  #   static_configs:
  #     - targets: ['postgres-exporter-ogrenci:9187']
  #       labels:
  #         service: 'postgres-ogrenci'

  # - job_name: 'postgres-personel'
  #   static_configs:
  #     - targets: ['postgres-exporter-personel:9187']
  #       labels:
  #         service: 'postgres-personel'

  # Redis Exporter (eğer kullanıyorsanız)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'

  # RabbitMQ (built-in metrics endpoint)
  - job_name: 'rabbitmq'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'rabbitmq'
          environment: 'development'

  # Elasticsearch exporters (eğer kullanıyorsanız)
  # - job_name: 'elasticsearch-log'
  #   static_configs:
  #     - targets: ['elasticsearch-exporter-log:9114']
  #       labels:
  #         service: 'elasticsearch-log'

  # - job_name: 'elasticsearch-jaeger'
  #   static_configs:
  #     - targets: ['elasticsearch-exporter-jaeger:9114']
  #       labels:
  #         service: 'elasticsearch-jaeger'
